name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build
        run: go build -ldflags="-s -w" -o bsh ./cmd/bsh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -count=1 ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Build + package .tar.zst
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for GOOS in linux; do
            for GOARCH in amd64 arm64; do
              echo "--- building bsh ${TAG} ${GOOS}/${GOARCH} ---"
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" -o "dist/bsh_${GOOS}_${GOARCH}/bsh" ./cmd/bsh
              cp README.md "dist/bsh_${GOOS}_${GOARCH}/"
              ARCHIVE="bsh_${TAG}_${GOOS}_${GOARCH}"
              mkdir -p dist/tar-zst
              tar -I zstd -cf "dist/tar-zst/${ARCHIVE}.tar.zst" -C "dist/bsh_${GOOS}_${GOARCH}" .
            done
          done

      - name: Upload .tar.zst to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          for f in dist/tar-zst/*.tar.zst; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber
          done
